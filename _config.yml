title: Front Range WELS
description: >-
  WELS Lutheran churches along Colorado's Front Range — worship, locations,
  events, and the annual Front Range softball tournament.
url: "https://www.frontrangewels.com"
baseurl: ""
lang: en_US

# Default preview image for shared links (OpenGraph / Twitter cards).
image: /assets/img/social-card.png
twitter:
  card: summary_large_image
logo: /assets/img/social-card.png

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Per-year tournament pages live in the _softball collection and render at
# /softball/<year>.html.
collections:
  softball:
    output: true
    permalink: /softball/:name.html

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/social-card.png
  - scope:
      path: ""
      type: softball
    values:
      layout: softball_year

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .gitignore
